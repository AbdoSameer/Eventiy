# ─────────────────────────────────────────────────────────────────────────────
# Eventy — GitLab CI/CD pipeline (production-ready)
#
# Builds, tests, containerizes, and pushes both the .NET 9 backend and the
# Angular 19 frontend to the GitLab Container Registry ($CI_REGISTRY_IMAGE).
#
# No manual registry variables needed: $CI_REGISTRY, $CI_REGISTRY_IMAGE,
# $CI_REGISTRY_USER, $CI_REGISTRY_PASSWORD are auto-injected by GitLab.
#
# Runner requirement: jobs using Docker (DinD / buildx) need a runner with
# the `docker` executor and `privileged = true` (GitLab shared Linux runners do).
# ─────────────────────────────────────────────────────────────────────────────

variables:
  # BuildKit for better layer caching + cross-stage cache.
  DOCKER_BUILDKIT: "1"
  # DinD: TLS enabled (port 2376 with certs). Matches docker:24-dind defaults.
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"
  # Image name suffixes under $CI_REGISTRY_IMAGE (…/backend:latest, …/frontend:latest).
  BACKEND_IMAGE: backend
  FRONTEND_IMAGE: frontend
  # .NET / Node version pins (also baked into the Dockerfiles).
  DOTNET_SDK_IMAGE: mcr.microsoft.com/dotnet/sdk:9.0
  NODE_IMAGE: node:22-alpine
  GIT_DEPTH: "0"  # needed for commit-based versioning / SemVer tags
  # Keep NuGet packages inside the project dir so GitLab can actually cache them
  # (paths outside $CI_PROJECT_DIR are silently not archived).
  NUGET_PACKAGES: $CI_PROJECT_DIR/.nuget/packages

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "master"
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH =~ /^release\//

default:
  interruptible: true
  # `retry` must be an object with `max` + `when` — NOT a list. Retrying only
  # infrastructure flakiness, never real test failures.
  retry:
    max: 1
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

# ─────────────────────────────────────────────────────────────────────────────
# Stage 1: Backend unit tests (Domain + Application — no Docker needed)
#
# `dotnet test` accepts only ONE project/solution as positional arg (MSB1008
# otherwise), so we run the whole solution and split via --filter on namespace.
# ─────────────────────────────────────────────────────────────────────────────
backend-unit-tests:
  stage: test-unit
  image: ${DOTNET_SDK_IMAGE}
  cache:
    # GitLab caps cache:key:files at 2 entries. Eventiy.sln captures project-
    # graph changes; Eventy.WebApi.csproj captures package-reference changes
    # in the entry-point project (transitively the whole dependency surface).
    key:
      files:
        - Eventiy.sln
        - Eventy.WebApi/Eventy.WebApi.csproj
      prefix: nuget-unit
    paths:
      - .nuget/packages
  script:
    - dotnet restore Eventiy.sln
    - >
      dotnet test Eventiy.sln
      --configuration Release
      --logger "trx;LogFileName=tests.trx"
      --logger "console;verbosity=normal"
      --settings tests/Eventy.Tests.runsettings
      --filter "FullyQualifiedName!~IntegrationTests&FullyQualifiedName!~ConcurrencyTests&FullyQualifiedName!~Testing.Foundation"
      --
      RunConfiguration.ResultsDirectory=${CI_PROJECT_DIR}/test-results/unit
  artifacts:
    when: always
    paths:
      - test-results/unit/**/*.trx
    reports:
      junit: test-results/unit/**/*.trx
    expire_in: 7 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "master"
    - if: $CI_COMMIT_TAG

# ─────────────────────────────────────────────────────────────────────────────
# Stage 1 (parallel): Frontend build sanity check
# ─────────────────────────────────────────────────────────────────────────────
frontend-build-check:
  stage: test-unit
  image: ${NODE_IMAGE}
  cache:
    key:
      files:
        - EventiyApp/package-lock.json
      prefix: npm-frontend
    paths:
      - EventiyApp/.npm-cache
  before_script:
    - cd EventiyApp
    - npm config set cache $(pwd)/.npm-cache --global
  script:
    - npm ci --no-audit --no-fund --ignore-scripts
    - npm run build -- --configuration production
  artifacts:
    when: on_success
    paths:
      - EventiyApp/dist/
    expire_in: 1 day
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "master"
    - if: $CI_COMMIT_TAG

# ─────────────────────────────────────────────────────────────────────────────
# Stage 2: Backend integration / concurrency tests (Testcontainers → needs DinD)
# Testcontainers spins up MSSQL containers, so this job MUST run with DinD.
# Run only on master & tags to keep MR pipelines fast.
# ─────────────────────────────────────────────────────────────────────────────
backend-integration-tests:
  stage: test-integration
  image: ${DOTNET_SDK_IMAGE}
  services:
    - name: docker:24-dind
      alias: docker
  variables:
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_VERIFY: "1"
    DOCKER_CERT_PATH: /certs/client
  before_script:
    # Testcontainers discovers Docker via the CLI, so install it inside the SDK
    # image. `docker.io` is the Debian-friendly package name.
    - apt-get update && apt-get install -y --no-install-recommends docker.io
  cache:
    key:
      files:
        - Eventiy.sln
        - Eventy.WebApi/Eventy.WebApi.csproj
      prefix: nuget-int
    paths:
      - .nuget/packages
  script:
    - dotnet restore Eventiy.sln
    - >
      dotnet test Eventiy.sln
      --configuration Release
      --logger "trx;LogFileName=integration.trx"
      --logger "console;verbosity=normal"
      --settings tests/Eventy.Tests.runsettings
      --filter "FullyQualifiedName~IntegrationTests|FullyQualifiedName~ConcurrencyTests"
      --
      RunConfiguration.ResultsDirectory=${CI_PROJECT_DIR}/test-results/integration
  artifacts:
    when: always
    paths:
      - test-results/integration/**/*.trx
    reports:
      junit: test-results/integration/**/*.trx
    expire_in: 7 days
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
    - if: $CI_COMMIT_TAG

# ─────────────────────────────────────────────────────────────────────────────
# Stage 3: Build & push Docker images to the GitLab Container Registry.
#
# Uses a dedicated `docker-container` buildx builder so we can export/import
# cache to the registry (the default `docker` driver cannot). The builder is
# created per-job with a unique name and removed in after_script to avoid
# leftover containers and name collisions on concurrent runners.
# ─────────────────────────────────────────────────────────────────────────────
.docker-push:
  stage: docker-build-push
  image: docker:24
  services:
    - name: docker:24-dind
      alias: docker
  variables:
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_VERIFY: "1"
    DOCKER_CERT_PATH: /certs/client
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login "$CI_REGISTRY" -u "$CI_REGISTRY_USER" --password-stdin
    # Unique builder name per job → safe under concurrent execution.
    # `docker-container` driver is required for --cache-to type=registry.
    # buildx refuses to create a builder directly from TLS env vars (DinD),
    # so create a docker context first and attach the builder to it.
    - docker context create ci-context
    - export BUILDX_BUILDER="builder-${CI_JOB_ID}"
    - docker buildx create ci-context --name "$BUILDX_BUILDER" --use --driver docker-container
    - docker buildx inspect --bootstrap "$BUILDX_BUILDER"
  after_script:
    # Always clean up the builder container so nothing leaks between jobs/runners.
    - docker buildx rm "builder-${CI_JOB_ID}" || true
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
    - if: $CI_COMMIT_TAG

backend:image:
  extends: .docker-push
  needs: ["backend-unit-tests"]
  script:
    - export BUILDX_BUILDER="builder-${CI_JOB_ID}"
    - >
      docker buildx build
      --builder "$BUILDX_BUILDER"
      --file Dockerfile.backend
      --tag "${CI_REGISTRY_IMAGE}/${BACKEND_IMAGE}:${CI_COMMIT_SHORT_SHA}"
      --tag "${CI_REGISTRY_IMAGE}/${BACKEND_IMAGE}:latest"
      --cache-from "type=registry,ref=${CI_REGISTRY_IMAGE}/${BACKEND_IMAGE}:buildcache"
      --cache-to "type=registry,ref=${CI_REGISTRY_IMAGE}/${BACKEND_IMAGE}:buildcache,mode=max"
      --push
      .
    - echo "Pushed ${CI_REGISTRY_IMAGE}/${BACKEND_IMAGE}:${CI_COMMIT_SHORT_SHA} and :latest"

frontend:image:
  extends: .docker-push
  needs: ["frontend-build-check"]
  script:
    - export BUILDX_BUILDER="builder-${CI_JOB_ID}"
    - >
      docker buildx build
      --builder "$BUILDX_BUILDER"
      --file Dockerfile.frontend
      --tag "${CI_REGISTRY_IMAGE}/${FRONTEND_IMAGE}:${CI_COMMIT_SHORT_SHA}"
      --tag "${CI_REGISTRY_IMAGE}/${FRONTEND_IMAGE}:latest"
      --cache-from "type=registry,ref=${CI_REGISTRY_IMAGE}/${FRONTEND_IMAGE}:buildcache"
      --cache-to "type=registry,ref=${CI_REGISTRY_IMAGE}/${FRONTEND_IMAGE}:buildcache,mode=max"
      --push
      .
    - echo "Pushed ${CI_REGISTRY_IMAGE}/${FRONTEND_IMAGE}:${CI_COMMIT_SHORT_SHA} and :latest"

# ─────────────────────────────────────────────────────────────────────────────
# Stage 4 (optional): Tag-gated release marker — promote :<sha> → :<tag>.
# ─────────────────────────────────────────────────────────────────────────────
release:tag:
  stage: release
  image: docker:24
  services:
    - name: docker:24-dind
      alias: docker
  variables:
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_VERIFY: "1"
    DOCKER_CERT_PATH: /certs/client
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login "$CI_REGISTRY" -u "$CI_REGISTRY_USER" --password-stdin
  script:
    - docker pull "${CI_REGISTRY_IMAGE}/${BACKEND_IMAGE}:${CI_COMMIT_SHORT_SHA}"
    - docker tag  "${CI_REGISTRY_IMAGE}/${BACKEND_IMAGE}:${CI_COMMIT_SHORT_SHA}" "${CI_REGISTRY_IMAGE}/${BACKEND_IMAGE}:${CI_COMMIT_TAG}"
    - docker push "${CI_REGISTRY_IMAGE}/${BACKEND_IMAGE}:${CI_COMMIT_TAG}"
    - docker pull "${CI_REGISTRY_IMAGE}/${FRONTEND_IMAGE}:${CI_COMMIT_SHORT_SHA}"
    - docker tag  "${CI_REGISTRY_IMAGE}/${FRONTEND_IMAGE}:${CI_COMMIT_SHORT_SHA}" "${CI_REGISTRY_IMAGE}/${FRONTEND_IMAGE}:${CI_COMMIT_TAG}"
    - docker push "${CI_REGISTRY_IMAGE}/${FRONTEND_IMAGE}:${CI_COMMIT_TAG}"
  rules:
    - if: $CI_COMMIT_TAG

# ── Stage order ──────────────────────────────────────────────────────────────
stages:
  - test-unit
  - test-integration
  - docker-build-push
  - release
