# ─────────────────────────────────────────────────────────────────────────────
# Eventy — GitLab CI/CD pipeline
#
# Builds, tests, containerizes, and pushes both the .NET 9 backend and the
# Angular 19 frontend to the GitLab Container Registry ($CI_REGISTRY_IMAGE),
# which is auto-resolved from your project's namespace (including the numeric
# suffix GitLab adds to disambiguate group names — handled automatically).
#
# No manual registry variables are required: $CI_REGISTRY, $CI_REGISTRY_IMAGE,
# $CI_REGISTRY_USER and $CI_REGISTRY_PASSWORD are injected by GitLab itself.
#
# Runner requirement: jobs that use Docker (DinD) need a runner with the
# `docker` executor and `privileged = true` (GitLab shared Linux runners do).
# ─────────────────────────────────────────────────────────────────────────────

variables:
  # Use BuildKit for better layer caching + secrets during build.
  DOCKER_BUILDKIT: "1"
  # Docker-in-Docker: TLS cert dir matches the `docker:24-dind` default so the
  # DinD daemon and the docker CLI client agree on the TLS setup.
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"
  # Image name suffixes under $CI_REGISTRY_IMAGE (e.g. …/backend:latest).
  BACKEND_IMAGE: backend
  FRONTEND_IMAGE: frontend
  # .NET / Node version pins (also baked into the Dockerfiles).
  DOTNET_SDK_IMAGE: mcr.microsoft.com/dotnet/sdk:9.0
  NODE_IMAGE: node:22-alpine
  GIT_DEPTH: "0"  # needed for commit-based versioning / SemVer tags

# Run the full pipeline only on the main branch, MRs, and version tags.
workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "master"
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH =~ /^release\//

default:
  interruptible: true
  retry:
    max: 1
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

# ─────────────────────────────────────────────────────────────────────────────
# Stage 1: Backend unit tests (Domain + Application — no Docker needed)
# Run only the fast unit-test projects; integration/concurrency tests need
# Testcontainers and run in a separate DinD-enabled stage below.
# ─────────────────────────────────────────────────────────────────────────────
backend-unit-tests:
  stage: test
  image: ${DOTNET_SDK_IMAGE}
  cache:
    key:
      files:
        - Eventiy.sln
        - Domain/Domain.csproj
        - Application/Application.csproj
      prefix: nuget-unit
    paths:
      - ~/.nuget/packages
  script:
    - dotnet restore Eventiy.sln
    - >
      dotnet test
      tests/Eventy.Domain.UnitTests/Eventy.Domain.UnitTests.csproj
      tests/Eventy.Application.UnitTests/Eventy.Application.UnitTests.csproj
      --configuration Release
      --logger "trx;LogFileName=tests.trx"
      --logger "console;verbosity=normal"
      --collect:"XPlat Code Coverage"
      --settings tests/Eventy.Tests.runsettings
      --
      RunConfiguration.ResultsDirectory=${CI_PROJECT_DIR}/test-results/unit
    - |
      if [ -d test-results/unit ]; then
        find test-results/unit -name "coverage.cobertura.xml" \
          -exec cp {} test-results/unit/coverage.cobertura.xml \; || true
      fi
  coverage: '/Total\s*\|\s*([0-9]+\.[0-9]+)%/'
  artifacts:
    when: always
    paths:
      - test-results/unit/**/*.trx
      - test-results/unit/**/coverage.cobertura.xml
    reports:
      junit: test-results/unit/**/*.trx
      coverage_report:
        coverage_format: cobertura
        path: test-results/unit/**/coverage.cobertura.xml
    expire_in: 7 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "master"
    - if: $CI_COMMIT_TAG

# ─────────────────────────────────────────────────────────────────────────────
# Stage 1 (parallel): Frontend lint + build sanity check
# ─────────────────────────────────────────────────────────────────────────────
frontend-build-check:
  stage: test
  image: ${NODE_IMAGE}
  cache:
    key:
      files:
        - EventiyApp/package-lock.json
      prefix: npm-frontend
    paths:
      - EventiyApp/.npm-cache
  before_script:
    - cd EventiyApp
    - npm config set cache $(pwd)/.npm-cache --global
  script:
    - npm ci --no-audit --no-fund --ignore-scripts
    - npm run build -- --configuration production
  artifacts:
    when: on_success
    paths:
      - EventiyApp/dist/
    expire_in: 1 day
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "master"
    - if: $CI_COMMIT_TAG

# ─────────────────────────────────────────────────────────────────────────────
# Stage 2: Backend integration / concurrency tests (Testcontainers → needs DinD)
# Testcontainers spins up MSSQL containers, so this job MUST run with a
# Docker-in-Docker service and the docker CLI able to reach it.
# Run only on master & tags to keep MR pipelines fast.
# ─────────────────────────────────────────────────────────────────────────────
backend-integration-tests:
  stage: test-integration
  image: ${DOTNET_SDK_IMAGE}
  services:
    - name: docker:24-dind
      alias: docker
  variables:
    # DinD with TLS enabled (DOCKER_TLS_CERTDIR=/certs) → connect via the cert.
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_VERIFY: "1"
    DOCKER_CERT_PATH: /certs/client
  before_script:
    # Install the docker CLI inside the SDK image so Testcontainers' docker
    # discovery works alongside the dotnet test process.
    - apt-get update && apt-get install -y --no-install-recommends docker.io
  cache:
    key:
      files:
        - Eventiy.sln
      prefix: nuget-int
    paths:
      - ~/.nuget/packages
  script:
    - dotnet restore Eventiy.sln
    - >
      dotnet test
      tests/Eventy.IntegrationTests/Eventy.IntegrationTests.csproj
      tests/Eventy.ConcurrencyTests/Eventy.ConcurrencyTests.csproj
      --configuration Release
      --logger "trx;LogFileName=integration.trx"
      --logger "console;verbosity=normal"
      --settings tests/Eventy.Tests.runsettings
      --
      RunConfiguration.ResultsDirectory=${CI_PROJECT_DIR}/test-results/integration
  artifacts:
    when: always
    paths:
      - test-results/integration/**/*.trx
    reports:
      junit: test-results/integration/**/*.trx
    expire_in: 7 days
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
    - if: $CI_COMMIT_TAG

# ─────────────────────────────────────────────────────────────────────────────
# Stage 3: Build & push Docker images to the GitLab Container Registry.
# Uses BuildKit cache imports to the registry so rebuilds reuse layers
# (no cold start every run). Tags both :<sha> (immutable, deployable) and
# :latest (rolling).
# ─────────────────────────────────────────────────────────────────────────────
.docker-push:
  stage: build-push
  image: docker:24
  services:
    - name: docker:24-dind
      alias: docker
  variables:
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_VERIFY: "1"
    DOCKER_CERT_PATH: /certs/client
  before_script:
    # $CI_REGISTRY_USER / $CI_REGISTRY_PASSWORD are auto-injected by GitLab.
    - echo "$CI_REGISTRY_PASSWORD" | docker login "$CI_REGISTRY" -u "$CI_REGISTRY_USER" --password-stdin
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
    - if: $CI_COMMIT_TAG

backend:image:
  extends: .docker-push
  needs: ["backend-unit-tests"]
  script:
    - export TAG_SHA="${CI_REGISTRY_IMAGE}/${BACKEND_IMAGE}:${CI_COMMIT_SHORT_SHA}"
    - export TAG_LATEST="${CI_REGISTRY_IMAGE}/${BACKEND_IMAGE}:latest"
    - >
      docker buildx build
      --file Dockerfile.backend
      --tag "$TAG_SHA"
      --tag "$TAG_LATEST"
      --build-arg BUILDKIT_INLINE_CACHE=1
      --cache-from "type=registry,ref=${CI_REGISTRY_IMAGE}/${BACKEND_IMAGE}:buildcache"
      --cache-to   "type=registry,ref=${CI_REGISTRY_IMAGE}/${BACKEND_IMAGE}:buildcache,mode=max"
      --push
      .
    - echo "Pushed $TAG_SHA and $TAG_LATEST"

frontend:image:
  extends: .docker-push
  needs: ["frontend-build-check"]
  script:
    - export TAG_SHA="${CI_REGISTRY_IMAGE}/${FRONTEND_IMAGE}:${CI_COMMIT_SHORT_SHA}"
    - export TAG_LATEST="${CI_REGISTRY_IMAGE}/${FRONTEND_IMAGE}:latest"
    - >
      docker buildx build
      --file Dockerfile.frontend
      --tag "$TAG_SHA"
      --tag "$TAG_LATEST"
      --build-arg BUILDKIT_INLINE_CACHE=1
      --cache-from "type=registry,ref=${CI_REGISTRY_IMAGE}/${FRONTEND_IMAGE}:buildcache"
      --cache-to   "type=registry,ref=${CI_REGISTRY_IMAGE}/${FRONTEND_IMAGE}:buildcache,mode=max"
      --push
      .
    - echo "Pushed $TAG_SHA and $TAG_LATEST"

# ─────────────────────────────────────────────────────────────────────────────
# Stage 4 (optional): Tag-gated release marker
# Enable when you tag commits with v1.2.3. Promotes the :<sha> image to :<tag>.
# ─────────────────────────────────────────────────────────────────────────────
release:tag:
  stage: release
  image: docker:24
  services:
    - name: docker:24-dind
      alias: docker
  variables:
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_VERIFY: "1"
    DOCKER_CERT_PATH: /certs/client
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login "$CI_REGISTRY" -u "$CI_REGISTRY_USER" --password-stdin
  script:
    - docker pull "${CI_REGISTRY_IMAGE}/${BACKEND_IMAGE}:${CI_COMMIT_SHORT_SHA}"
    - docker tag  "${CI_REGISTRY_IMAGE}/${BACKEND_IMAGE}:${CI_COMMIT_SHORT_SHA}" "${CI_REGISTRY_IMAGE}/${BACKEND_IMAGE}:${CI_COMMIT_TAG}"
    - docker push "${CI_REGISTRY_IMAGE}/${BACKEND_IMAGE}:${CI_COMMIT_TAG}"
    - docker pull "${CI_REGISTRY_IMAGE}/${FRONTEND_IMAGE}:${CI_COMMIT_SHORT_SHA}"
    - docker tag  "${CI_REGISTRY_IMAGE}/${FRONTEND_IMAGE}:${CI_COMMIT_SHORT_SHA}" "${CI_REGISTRY_IMAGE}/${FRONTEND_IMAGE}:${CI_COMMIT_TAG}"
    - docker push "${CI_REGISTRY_IMAGE}/${FRONTEND_IMAGE}:${CI_COMMIT_TAG}"
  rules:
    - if: $CI_COMMIT_TAG

# ── Stage order ──────────────────────────────────────────────────────────────
stages:
  - test
  - test-integration
  - build-push
  - release
