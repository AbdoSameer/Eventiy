# ─────────────────────────────────────────────────────────────────────────────
# Nginx configuration for the Eventiy Angular SPA + API reverse proxy.
#
# - Serves the built Angular production bundle (browser/ output).
# - SPA fallback so client-side routes survive a page refresh (no 404).
# - Reverse-proxies /api/* and /ws to the backend container.
#
# The backend upstream is configurable via the EVENTY_API_UPSTREAM env var
# (default: backend:8080). Set it at container start to point at your backend
# host:port without rebuilding the image. The nginx-unprivileged entrypoint
# runs envsubst on this file when it's placed at /etc/nginx/templates/.
#
# Listens on 8080 so it runs as a non-root user (nginxinc/nginx-unprivileged).
# ─────────────────────────────────────────────────────────────────────────────

# `${EVENTY_API_UPSTREAM}` is substituted at container start by the nginx
# entrypoint's envsubst pass. Default value is set via ENV in the Dockerfile.
upstream eventy_backend {
    server ${EVENTY_API_UPSTREAM};
}

server {
    listen       8080;
    server_name  _;

    # Angular 19 application builder emits dist/<project>/browser/
    root   /usr/share/nginx/html;
    index  index.html;

    # Gzip text assets served by nginx (Angular JS/CSS are already minified).
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_vary on;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        application/xml
        image/svg+xml;

    # ── Reverse proxy: API ───────────────────────────────────────────────────
    # Forward /api/* to the ASP.NET Core backend container.
    location /api/ {
        proxy_pass         http://eventy_backend;
        proxy_http_version 1.1;

        # Pass real client info so the backend sees the original request.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # The backend uses WebSockets (Program.cs: UseWebSockets + WebSocketMiddleware).
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;

        # Long-running API calls / payments / SSE need generous timeouts.
        proxy_connect_timeout 60s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;

        # Allow large uploads (matches MultipartBodyLengthLimit = 60MB in Program.cs).
        client_max_body_size 64m;
    }

    # ── Reverse proxy: Scalar/OpenAPI docs (optional, dev/staging aid) ───────
    location /scalar/ {
        proxy_pass         http://eventy_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /openapi.json {
        proxy_pass         http://eventy_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
    }

    # ── Static assets: hashed by Angular, so cache aggressively ──────────────
    location ~* \.(?:css|js|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ── Angular service worker (ngsw): must not be cached ────────────────────
    location = /ngsw.json {
        expires off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # index.html itself should always be revalidated so deploys roll out fast.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # ── SPA fallback: serve index.html for any unknown route ─────────────────
    # This is the critical bit — without it, refreshing /events/123 returns 404.
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# Map used by the WebSocket Upgrade header above.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}
