<section class="hero-section">
  <div class="hero-container">
    
    <!-- Left Column: Content -->
    <div class="hero-content">
      <div class="brand-badge">
        <span class="sparkles">✨</span>
        <span class="badge-text">THE PEOPLE PLATFORM</span>
      </div>
      
      <h1 class="hero-title">
        Where interests become friendships
      </h1>
      
      <p class="hero-subtitle">
        Whatever your interest, from hiking and reading to networking and skill sharing,
        there are thousands of people waiting to meet you.
      </p>

      <div class="hero-cta-row">
        <button class="btn-primary">Join Eventiy</button>
        <a href="#events" class="btn-secondary">See all events &rarr;</a>
      </div>
      
      <div class="hero-search-wrapper">
        <app-search-bar (search)="onSearch($event)"></app-search-bar>
      </div>
    </div>

    <!-- Right Column: Illustration -->
    <div class="hero-visual">
      <img
        src="assets/images/hero-illustration.svg"
        alt="People connecting at events"
        class="hero-illustration"
        onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"
      />
      <div class="hero-image-fallback">
        <div class="hero-fallback-content">
          <svg class="hero-fallback-svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 018.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0111.964-3.07M12 6.375a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zm8.25 2.25a2.625 2.625 0 11-5.25 0 2.625 2.625 0 015.25 0z" />
          </svg>
          <p>Hero illustration</p>
          <small>Place your image at<br><code>public/assets/images/hero-illustration.svg</code></small>
        </div>
      </div>
    </div>

  </div>
</section>
