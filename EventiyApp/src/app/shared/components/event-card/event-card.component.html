<article
  (click)="open()"
  class="group cursor-pointer bg-white rounded-2xl shadow-md hover:shadow-xl transition-all duration-300 overflow-hidden hover:-translate-y-1 flex flex-col"
>
  @let evt = event()!;
  <!-- Image section: fixed 200px -->
  <div class="relative h-[200px] overflow-hidden rounded-t-2xl bg-gradient-to-br from-rose-400 to-orange-300">
    @if (evt.coverPhotoUrl) {
      <img
        [src]="evt.coverPhotoUrl"
        [alt]="evt.title"
        class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300"
        loading="lazy"
        appImgFallback
      />
    } @else {
      <div class="w-full h-full flex items-center justify-center text-white text-5xl select-none">
        🎟️
      </div>
    }

    <!-- Price badge top-left -->
    <span class="absolute top-3 left-3 bg-white/90 text-gray-900 text-xs font-bold px-3 py-1 rounded-full shadow-sm">
      {{ priceLabel }}
    </span>

    <!-- Share icon top-right -->
    <button (click)="share($event)" class="absolute top-3 right-3 w-8 h-8 flex items-center justify-center bg-white/90 rounded-full shadow-sm hover:bg-white transition-colors" aria-label="Share event">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.367 2.684 3 3 0 00-5.367-2.684z" />
      </svg>
    </button>
  </div>

  <!-- Body -->
  <div class="p-4 flex flex-col gap-1.5 flex-1">
    <h3 class="font-bold text-gray-900 line-clamp-2 leading-snug">
      {{ evt.title }}
    </h3>

    <p class="text-sm text-gray-500 flex items-center gap-1.5">
      <span>📅</span>
      <time [attr.datetime]="evt.date">{{ evt.date | dateFormat }}</time>
    </p>

    @if (evt.organizerName) {
      <p class="text-sm text-gray-400">by {{ evt.organizerName }}</p>
    }

    <div class="flex items-center gap-2 mt-1">
      <div class="flex -space-x-2">
        <div class="w-6 h-6 rounded-full bg-gray-300 border-2 border-white"></div>
        <div class="w-6 h-6 rounded-full bg-gray-400 border-2 border-white"></div>
        <div class="w-6 h-6 rounded-full bg-gray-500 border-2 border-white"></div>
      </div>
      <span class="text-xs text-gray-500 font-medium">{{ attendeeLabel }}</span>
    </div>

    <div class="mt-auto pt-2 flex justify-end">
      <span class="text-sm font-medium text-primary">View details &rarr;</span>
    </div>
  </div>
</article>
