<div
  class="fixed inset-0 z-50 bg-black/90 flex flex-col items-center justify-center"
  (click)="close.emit()"
>
  <!-- Close button -->
  <button
    (click)="close.emit()"
    class="absolute top-4 right-4 text-white/80 hover:text-white text-3xl z-10 w-12 h-12 flex items-center justify-center"
    aria-label="Close lightbox"
  >&times;</button>

  <!-- Photo counter top-right -->
  <div class="absolute top-6 right-16 text-white/70 text-sm font-medium z-10 select-none">
    {{ currentIndex() + 1 }} / {{ photos().length }}
  </div>

  <!-- Previous arrow -->
  @if (photos().length > 1) {
    <button
      (click)="goPrev(); $event.stopPropagation()"
      class="absolute left-4 top-1/2 -translate-y-1/2 text-white/80 hover:text-white text-5xl z-10 w-16 h-16 flex items-center justify-center select-none"
      aria-label="Previous photo"
    >&#8249;</button>
  }

  <!-- Image -->
  <img
    [src]="photos()[currentIndex()].publicUrl"
    [alt]="photos()[currentIndex()].caption ?? 'Photo'"
    class="max-h-[85vh] max-w-[90vw] object-contain rounded-lg select-none"
    (click)="$event.stopPropagation()"
    appImgFallback
  />

  <!-- Caption -->
  @if (photos()[currentIndex()].caption) {
    <p class="mt-3 text-white/80 text-sm text-center max-w-lg px-4 select-none">
      {{ photos()[currentIndex()].caption }}
    </p>
  }

  <!-- Next arrow -->
  @if (photos().length > 1) {
    <button
      (click)="goNext(); $event.stopPropagation()"
      class="absolute right-4 top-1/2 -translate-y-1/2 text-white/80 hover:text-white text-5xl z-10 w-16 h-16 flex items-center justify-center select-none"
      aria-label="Next photo"
    >&#8250;</button>
  }
</div>
